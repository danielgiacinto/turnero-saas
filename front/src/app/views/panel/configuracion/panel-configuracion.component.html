<header class="mb-4">
  <h1 class="h4 mb-1 d-flex align-items-center gap-2">
    <i class="bi bi-gear-fill text-muted" aria-hidden="true"></i>
    Configuración
  </h1>
  <p class="text-muted small mb-0">Elegí qué querés configurar en tu comercio.</p>
</header>

<section class="row g-3" aria-label="Módulos de configuración">
  @for (modulo of modulos(); track modulo.ruta) {
    <div class="col-12 col-md-6">
      <a
        class="config-hub-card"
        [routerLink]="modulo.ruta"
        [attr.aria-label]="modulo.titulo"
      >
        <span class="config-hub-card__icono" aria-hidden="true">
          <i class="bi" [class]="modulo.icono"></i>
        </span>
        <span class="config-hub-card__texto">
          <span class="config-hub-card__titulo">{{ modulo.titulo }}</span>
          <span class="config-hub-card__desc">{{ modulo.descripcion }}</span>
        </span>
        <i class="bi bi-chevron-right config-hub-card__flecha" aria-hidden="true"></i>
      </a>
    </div>
  }
</section>
