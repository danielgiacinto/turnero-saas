<header class="mb-4">
  <nav class="mb-2" aria-label="Miga de pan">
    <a routerLink="/panel/configuracion" class="config-voltar small text-decoration-none">
      <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>
      Configuración
    </a>
  </nav>
  <h1 class="h4 mb-1 d-flex align-items-center gap-2">
    <i class="bi bi-palette-fill text-muted" aria-hidden="true"></i>
    Apariencia
  </h1>
  <p class="text-muted small mb-0">Personalizá el modo y la paleta de colores del panel.</p>
</header>

<section class="panel-comercio__tarjeta" aria-labelledby="titulo-apariencia">
  <h2 id="titulo-apariencia" class="visually-hidden">Opciones de apariencia</h2>

  <p class="small text-muted mb-3">Modo de visualización</p>
  <div class="row g-3 mb-4">
    @for (modo of modos; track modo.id) {
      <div class="col-12 col-sm-6">
        <button
          type="button"
          class="config-modo-card w-100 text-start"
          [class.config-modo-card--activo]="modoActivo(modo.id)"
          (click)="seleccionarModo(modo.id)"
          [attr.aria-pressed]="modoActivo(modo.id)"
        >
          <span class="config-modo-card__icono" aria-hidden="true">
            <i class="bi" [class]="modo.icono"></i>
          </span>
          <span class="config-modo-card__texto">
            <span class="config-modo-card__titulo">{{ modo.etiqueta }}</span>
            <span class="config-modo-card__desc">{{ modo.descripcion }}</span>
          </span>
          @if (modoActivo(modo.id)) {
            <i class="bi bi-check-circle-fill config-modo-card__check" aria-hidden="true"></i>
          }
        </button>
      </div>
    }
  </div>

  <p class="small text-muted mb-3">Paleta de colores</p>
  <div class="row g-3">
    @for (p of paletas; track p.id) {
      <div class="col-12 col-md-4">
        <button
          type="button"
          class="config-paleta-card w-100 text-start"
          [class.config-paleta-card--activa]="paletaActiva(p.id)"
          (click)="seleccionarPaleta(p.id)"
          [attr.aria-pressed]="paletaActiva(p.id)"
        >
          <div
            class="config-paleta-card__preview"
            [style.background]="p.colorFondoOscuro"
          >
            <span
              class="config-paleta-card__swatch"
              [style.background]="p.colorAcento"
            ></span>
            <span
              class="config-paleta-card__barra"
              [style.background]="p.colorAcento"
            ></span>
          </div>
          <div class="config-paleta-card__cuerpo">
            <span class="config-paleta-card__nombre">{{ p.nombre }}</span>
            <span class="config-paleta-card__desc">{{ p.descripcion }}</span>
          </div>
          @if (paletaActiva(p.id)) {
            <span class="config-paleta-card__badge">
              <i class="bi bi-check-lg" aria-hidden="true"></i>
              Activa
            </span>
          }
        </button>
      </div>
    }
  </div>
</section>
